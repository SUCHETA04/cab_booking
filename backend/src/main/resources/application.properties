spring.application.name=backend
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:./data/cab_booking;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret (Should be moved to env vars later)
jwt.secret=cabBookingSecretKeyThatNeedsToBeLongEnoughForHS256AlgorithmToWorkProperly123!
jwt.expiration=86400000

# Stripe Secret (To be configured)
stripe.api.key=YOUR_STRIPE_SECRET_KEY

# Google OAuth2 (To be configured)
spring.security.oauth2.client.registration.google.client-id=YOUR_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=profile,email
